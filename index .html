<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlockGambling - Protetor 3D</title>
    <style>
        /* Reset e base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            background: #0a0a0f;
            color: #fff;
            height: 100vh;
            width: 100vw;
        }

        /* Canvas 3D (Three.js) */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Overlay da UI */
        .ui-overlay {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            /* Permite cliques apenas nos elementos interativos */;
        }

        .ui-overlay>* {
            pointer-events: auto;
        }

        /* Card principal com efeito glassmorphism + brilho */
        .main-card {
            background: rgba(10, 10, 20, 0.65);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 48px;
            padding: 48px 56px;
            max-width: 720px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.8),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 0 60px rgba(0, 200, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-align: center;
        }

        .main-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.06) inset, 0 0 80px rgba(0, 200, 255, 0.15);
        }

        /* Título com gradiente neon */
        .title {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc, #ff6fd8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
            letter-spacing: 0.3px;
            margin-bottom: 32px;
        }

        /* Status em tempo real */
        .status-badge {
            display: inline-block;
            background: rgba(0, 255, 150, 0.12);
            border: 1px solid rgba(0, 255, 150, 0.2);
            border-radius: 100px;
            padding: 8px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #00ff96;
            letter-spacing: 0.5px;
            margin-bottom: 28px;
            backdrop-filter: blur(4px);
            animation: pulse-badge 2.5s ease-in-out infinite;
        }

        @keyframes pulse-badge {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.7;
                transform: scale(0.97);
            }
        }

        /* Botão de ativação */
        .btn-activate {
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            border: none;
            border-radius: 60px;
            padding: 18px 48px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 30px rgba(0, 212, 255, 0.25);
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
        }

        .btn-activate::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
            transform: rotate(25deg);
        }

        .btn-activate:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 50px rgba(0, 212, 255, 0.4);
        }

        .btn-activate:hover::before {
            opacity: 1;
        }

        .btn-activate:active {
            transform: scale(0.97);
        }

        .btn-activate .icon {
            font-size: 1.6rem;
            line-height: 1;
        }

        /* Grid de estatísticas */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 8px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 16px 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            transition: all 0.3s;
        }

        .stat-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }

        /* Lista de bloqueios recentes */
        .recent-block {
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-align: left;
        }

        .recent-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.25);
            margin-bottom: 12px;
        }

        .block-entry {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.7);
        }

        .block-entry .app {
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }

        .block-entry .time {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.75rem;
        }

        .block-entry .badge-block {
            background: rgba(255, 50, 50, 0.15);
            color: #ff6b6b;
            padding: 2px 12px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* Rodapé */
        .footer-note {
            margin-top: 28px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 0.2px;
        }

        /* Responsivo */
        @media (max-width: 640px) {
            .main-card {
                padding: 32px 24px;
                border-radius: 32px;
            }
            .title {
                font-size: 2.2rem;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .stat-item:last-child {
                grid-column: span 2;
            }
            .btn-activate {
                padding: 14px 32px;
                font-size: 1rem;
            }
        }

        /* Pequeno ajuste para scroll se necessário */
        .scrollable {
            max-height: 90vh;
            overflow-y: auto;
            padding: 20px 0;
            scrollbar-width: none;
        }
        .scrollable::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Container 3D -->
    <div id="canvas-container"></div>

    <!-- Interface sobreposta -->
    <div class="ui-overlay">
        <div class="scrollable">
            <div class="main-card">

                <div class="title">🛡️ BlockGambling</div>
                <div class="subtitle">Proteção inteligente contra jogos de azar</div>

                <div class="status-badge" id="statusBadge">
                    ⚡ Sistema ativo • 0 bloqueios hoje
                </div>

                <button class="btn-activate" id="toggleBtn">
                    <span class="icon">🔒</span>
                    <span id="btnText">Ativar Proteção</span>
                </button>

                <!-- Estatísticas -->
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-number" id="totalBlocks">0</div>
                        <div class="stat-label">Total bloqueios</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="todayBlocks">0</div>
                        <div class="stat-label">Hoje</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="lastBlock">--</div>
                        <div class="stat-label">Último bloqueio</div>
                    </div>
                </div>

                <!-- Registro recente -->
                <div class="recent-block">
                    <div class="recent-title">📋 Últimos bloqueios</div>
                    <div id="recentList">
                        <div class="block-entry">
                            <span class="app">Nenhum bloqueio ainda</span>
                            <span class="time">--</span>
                        </div>
                    </div>
                </div>

                <div class="footer-note">
                    Simulação • Para bloquear anúncios em apps nativos, é necessário um app com permissões de sistema
                </div>
            </div>
        </div>
    </div>

    <!-- Bibliotecas -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.126.0/build/three.module.js"
            }
        }
    </script>

    <!-- Script principal -->
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.126.0/examples/jsm/controls/OrbitControls.js';

        // --- 1. CONFIGURAÇÃO 3D ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);

        // Câmera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 8);
        camera.lookAt(0, 0, 0);

        // Renderer
        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        // --- 2. LUZES ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0x00d4ff, 1.2);
        dirLight.position.set(3, 5, 4);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0x7b2ffc, 0.6);
        fillLight.position.set(-3, 1, -2);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0xff6fd8, 0.4);
        rimLight.position.set(0, -1, -5);
        scene.add(rimLight);

        // --- 3. OBJETO PRINCIPAL - TORUS KNOT 3D ---
        const geometry = new THREE.TorusKnotGeometry(1.2, 0.45, 180, 24);
        const material = new THREE.MeshPhysicalMaterial({
            color: 0x00d4ff,
            metalness: 0.7,
            roughness: 0.15,
            clearcoat: 0.9,
            clearcoatRoughness: 0.1,
            emissive: 0x002244,
            emissiveIntensity: 0.3,
            envMapIntensity: 1.5,
            wireframe: false,
        });
        const knot = new THREE.Mesh(geometry, material);
        knot.castShadow = true;
        knot.receiveShadow = true;
        knot.position.y = 0.2;
        scene.add(knot);

        // Anel de partículas ao redor
        const particleGeo = new THREE.BufferGeometry();
        const particleCount = 800;
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const radius = 2.8 + Math.random() * 1.2;
            positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = radius * Math.cos(phi);
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const particleMat = new THREE.PointsMaterial({
            color: 0x7b2ffc,
            size: 0.035,
            transparent: true,
            opacity: 0.7,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true,
        });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // Anel secundário
        const ringGeo = new THREE.TorusGeometry(1.9, 0.02, 32, 100);
        const ringMat = new THREE.MeshPhysicalMaterial({
            color: 0x7b2ffc,
            emissive: 0x7b2ffc,
            emissiveIntensity: 0.2,
            transparent: true,
            opacity: 0.6,
            metalness: 0.3,
            roughness: 0.4,
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 3;
        ring.rotation.z = 0.2;
        scene.add(ring);

        // --- 4. CONTROLES (orbit suave) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.8;
        controls.enableZoom = true;
        controls.zoomSpeed = 0.8;
        controls.enablePan = false;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.minPolarAngle = 0.2;
        controls.target.set(0, 0.2, 0);

        // --- 5. LÓGICA DE BLOQUEIO (simulação) ---
        // Lista de palavras-chave de jogos de azar
        const gamblingKeywords = [
            'bet', 'casino', 'poker', 'roleta', 'slots', 'jackpot', 'aposta',
            'bingo', 'loteria', 'mega-sena', 'pôquer', 'blackjack', 'roleta',
            'caça-níquel', 'fortune', 'tigrinho', '888', 'bet365', 'blaze',
            'crash', 'double', 'mine', 'aviator', 'spaceman'
        ];

        // Apps simulados para demonstração
        const apps = ['Kwai', 'Instagram', 'Facebook', 'YouTube', 'TikTok', 'Twitter', 'WhatsApp', 'Telegram'];

        let isActive = false;
        let totalBlocks = 0;
        let todayBlocks = 0;
        let lastBlockTime = '--';
        const recentBlocks = [];

        // Elementos da UI
        const statusBadge = document.getElementById('statusBadge');
        const toggleBtn = document.getElementById('toggleBtn');
        const btnText = document.getElementById('btnText');
        const totalBlocksEl = document.getElementById('totalBlocks');
        const todayBlocksEl = document.getElementById('todayBlocks');
        const lastBlockEl = document.getElementById('lastBlock');
        const recentList = document.getElementById('recentList');

        // Função para gerar bloqueio simulado
        function simulateBlock() {
            if (!isActive) return;

            // Escolhe app aleatório
            const app = apps[Math.floor(Math.random() * apps.length)];
            // Gera palavra-chave aleatória
            const keyword = gamblingKeywords[Math.floor(Math.random() * gamblingKeywords.length)];
            // Horário atual
            const now = new Date();
            const timeStr = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

            // Incrementa contadores
            totalBlocks++;
            todayBlocks++;
            lastBlockTime = timeStr;

            // Adiciona ao histórico (mantém últimos 5)
            recentBlocks.unshift({ app, keyword, time: timeStr });
            if (recentBlocks.length > 5) recentBlocks.pop();

            // Atualiza UI
            updateUI();

            // Efeito visual no 3D (piscar)
            knot.material.emissiveIntensity = 1.5;
            setTimeout(() => {
                knot.material.emissiveIntensity = 0.3;
            }, 300);

            // Feedback sonoro (opcional, via vibração)
            if (navigator.vibrate) navigator.vibrate(30);

            // Agendar próximo bloqueio (entre 2 e 8 segundos)
            const nextDelay = 2000 + Math.random() * 6000;
            setTimeout(simulateBlock, nextDelay);
        }

        // Atualiza elementos da UI
        function updateUI() {
            totalBlocksEl.textContent = totalBlocks;
            todayBlocksEl.textContent = todayBlocks;
            lastBlockEl.textContent = lastBlockTime;

            // Atualiza status
            statusBadge.innerHTML = `
                ⚡ Sistema ativo • ${todayBlocks} bloqueios hoje
            `;

            // Atualiza lista recente
            if (recentBlocks.length === 0) {
                recentList.innerHTML = `
                    <div class="block-entry">
                        <span class="app">Nenhum bloqueio ainda</span>
                        <span class="time">--</span>
                    </div>
                `;
            } else {
                recentList.innerHTML = recentBlocks.map(block => `
                    <div class="block-entry">
                        <span class="app">🚫 ${block.app} • ${block.keyword}</span>
                        <span class="time">${block.time}</span>
                        <span class="badge-block">BLOQUEADO</span>
                    </div>
                `).join('');
            }
        }

        // Alternar ativação
        toggleBtn.addEventListener('click', () => {
            isActive = !isActive;
            if (isActive) {
                btnText.textContent = 'Desativar Proteção';
                toggleBtn.querySelector('.icon').textContent = '🔓';
                statusBadge.style.borderColor = 'rgba(0, 255, 150, 0.4)';
                statusBadge.style.color = '#00ff96';
                // Inicia simulação
                simulateBlock();
            } else {
                btnText.textContent = 'Ativar Proteção';
                toggleBtn.querySelector('.icon').textContent = '🔒';
                statusBadge.innerHTML = '⏸️ Sistema pausado';
                statusBadge.style.borderColor = 'rgba(255, 200, 0, 0.3)';
                statusBadge.style.color = '#ffcc00';
            }
        });

        // --- 6. ANIMAÇÃO E LOOP ---
        let clock = new THREE.Clock();

        function animate() {
            const delta = clock.getDelta();
            const elapsed = performance.now() * 0.001;

            // Rotaciona objeto principal
            knot.rotation.x += 0.003;
            knot.rotation.y += 0.007;
            knot.rotation.z += 0.002;

            // Anima partículas
            particles.rotation.y += 0.0004;
            particles.rotation.x = Math.sin(elapsed * 0.05) * 0.05;

            // Anel
            ring.rotation.z += 0.002;
            ring.rotation.x += 0.001;

            // Atualiza controles
            controls.update();

            // Render
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();

        // --- 7. RESPONSIVIDADE ---
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });

        // --- 8. INICIALIZAÇÃO ---
        updateUI();
        console.log('🛡️ BlockGambling iniciado! Interface 3D ativa.');
    </script>
</body>
</html>
